<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB DP VIEWER | PRO BY SHADOW JOKER</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #111; border: 1px solid var(--neon); padding: 30px; border-radius: 15px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h1 { color: var(--neon); font-size: 22px; letter-spacing: 2px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--neon); }
        button { width: 100%; padding: 12px; background: var(--neon); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #00cc33; transform: scale(1.02); }
        .result { margin-top: 25px; display: none; animation: fadeIn 0.5s ease; }
        #dpImg { width: 100%; border-radius: 10px; border: 2px solid var(--neon); margin-bottom: 15px; }
        .btn-link { display: inline-block; padding: 10px 20px; border: 1px solid var(--neon); color: var(--neon); text-decoration: none; border-radius: 5px; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>FB DP VIEWER PRO</h1>
    <input type="text" id="fbInput" placeholder="Username (e.g. zuck) or Link">
    <button onclick="fetchDP()">Fetch Full Image</button>

    <div id="resultBox" class="result">
        <img id="dpImg" src="" alt="Profile Picture">
        <br>
        <a id="downloadBtn" class="btn-link" target="_blank">View HD Image</a>
    </div>
</div>

<script>
    function fetchDP() {
        const input = document.getElementById('fbInput').value.trim();
        let userId = "";

        if (input.includes("facebook.com") || input.includes("fb.com")) {
            const parts = input.split('/').filter(Boolean);
            userId = parts.pop().split('?')[0];
            if(userId === "profile.php") {
                const urlParams = new URLSearchParams(input.split('?')[1]);
                userId = urlParams.get('id');
            }
        } else {
            userId = input;
        }

        if (userId) {
            // আমাদের Vercel API কে কল করা হচ্ছে
            const proxyUrl = `/api/get-dp?id=${userId}`;
            
            const img = document.getElementById('dpImg');
            img.src = proxyUrl;
            
            document.getElementById('downloadBtn').href = proxyUrl;
            document.getElementById('resultBox').style.display = 'block';
        } else {
            alert("সঠিক তথ্য দিন!");
        }
    }
</script>

</body>
</html>
